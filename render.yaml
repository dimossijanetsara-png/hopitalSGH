# ================================================================
#  SGHL — Render Blueprint (déploiement automatique)
#  Ce fichier déploie d'un seul clic :
#    - sghl-api  : Backend Django (Web Service)
#    - sghl-web  : Frontend Vue 3  (Static Site)
#    - sghl-db   : PostgreSQL      (Base de données gratuite)
#
#  Connectez votre dépôt GitHub sur render.com puis cliquez
#  "New Blueprint Instance" pour tout déployer automatiquement.
# ================================================================

services:
  # ------------------------------------------------------------------
  # BACKEND — Django 6 + Django Ninja + ASGI/Channels (WebSockets)
  # ------------------------------------------------------------------
  - type: web
    name: sghl-api
    runtime: python
    rootDir: sara-hosp-backend-python-django
    plan: free
    buildCommand: "./build.sh"
    startCommand: >
      gunicorn config.asgi:application
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:$PORT
      --workers 2
      --timeout 120
    healthCheckPath: /api/v1/health
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "sghl-api.onrender.com"
      - key: FRONTEND_URL
        value: "https://sghl-web.onrender.com"
      - key: CACHE_USE_REDIS
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: sghl-db
          property: connectionString
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "SGHL <noreply@sghl.com>"
      - key: AES_ENCRYPTION_KEY
        generateValue: true

  # ------------------------------------------------------------------
  # FRONTEND — Vue 3 + Vite 6 + Tailwind CSS v4
  # ------------------------------------------------------------------
  - type: web
    name: sghl-web
    runtime: static
    rootDir: sghl_web
    plan: free
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://sghl-api.onrender.com/api/v1"

# ------------------------------------------------------------------
# BASE DE DONNÉES — PostgreSQL (gratuit 90 jours)
# ------------------------------------------------------------------
databases:
  - name: sghl-db
    databaseName: sghl_db
    user: sghl_user
    plan: free
